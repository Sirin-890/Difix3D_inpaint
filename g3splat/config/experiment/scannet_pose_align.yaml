# @package _global_

defaults:
  - /dataset@_group_.scannet_pose: scannet_pose
  - override /model/encoder: noposplat
  - override /model/encoder/backbone: croco
  - override /loss: [mse, lpips, align]

wandb:
  name: re10k_scannet_pose_align
  tags: [re10k_scannet_pose_align, 256x256]

model:
  encoder:
    gs_params_head_type: dpt_gs
    pose_free: true
    intrinsics_embed_loc: encoder
    intrinsics_embed_type: token
    pretrained_weights: './pretrained_weights/MASt3R_ViTLarge_BaseDecoder_512_catmlpdpt_metric.pth'
  decoder:
    make_scale_invariant: true
    depth_ratio: 0



dataset:
  scannet_pose:
    view_sampler:
      warm_up_steps: 150_000

optimizer:
  lr: 5e-5
  warm_up_steps: 4000
  backbone_lr_multiplier: 0.1

data_loader:
  train:
    batch_size: 8

trainer:
  max_steps: 300_001
  val_check_interval: 2000

checkpointing:
  every_n_train_steps: 20_000