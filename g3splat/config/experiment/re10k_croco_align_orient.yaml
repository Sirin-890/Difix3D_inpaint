# @package _global_

defaults:
  - /dataset@_group_.re10k: re10k
  - override /model/encoder: noposplat
  - override /model/encoder/backbone: croco
  - override /loss: [mse, lpips, align, orient]

wandb:
  name: re10k_croco_align_orient_hpc
  tags: [re10k_croco_align_orient_hpc, 256x256]

model:
  encoder:
    gs_params_head_type: dpt_gs
    pose_free: true
    intrinsics_embed_loc: encoder
    intrinsics_embed_type: token
    pretrained_weights: './pretrained_weights/CroCo_V2_ViTLarge_BaseDecoder.pth'
  decoder:
    make_scale_invariant: true
    depth_ratio: 0
# depth_ratio 0 for mean (expected) depth
# depth_ratio 1 for median depth, 0 works for most cases

dataset:
  re10k:
    view_sampler:
      warm_up_steps: 18750

optimizer:
  lr: 1e-4
  warm_up_steps: 250
  backbone_lr_multiplier: 0.3

data_loader:
  train:
    batch_size: 6

trainer:
  # max_steps: 18751
  max_steps: 40002
  val_check_interval: 1000
  num_nodes: 6

checkpointing:
  every_n_train_steps: 9375
  save_top_k: 1
