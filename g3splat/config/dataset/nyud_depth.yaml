# Used for single-view depth evaluation
defaults:
  - base_dataset
  - view_sampler: bounded

name: nyud_depth
roots: [datasets/nyud_test]
augment: true

input_image_shape: [256, 256]
original_image_shape: [480, 640]
cameras_are_circular: false

baseline_min: 1e-3
baseline_max: 1e2
max_fov: 120.0

skip_bad_shape: false
